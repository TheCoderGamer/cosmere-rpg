name: prepare-release
run-name: Prepare release (${{ inputs.bump }})

# Aparece como botón "Run workflow" en la pestaña Actions de Forgejo
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Tipo de subida de versión'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(jq -r '.version' src/system.json)
          MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
          MINOR=$(echo "$CURRENT" | cut -d'.' -f2)
          PATCH=$(echo "$CURRENT" | cut -d'.' -f3)

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "Current version: $CURRENT -> New version: $NEW"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update system.json and package.json
        run: |
          NEW="${{ steps.version.outputs.new_version }}"
          TAG="v$NEW"
          DOWNLOAD_URL="https://kodegit.torakode.com/${{ github.repository }}/releases/download/$TAG/release.zip"

          jq --arg v "$NEW" --arg d "$DOWNLOAD_URL" \
            '.version = $v | .download = $d' \
            src/system.json > src/system.json.tmp
          mv src/system.json.tmp src/system.json

          jq --arg v "$NEW" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Commit version bump
        run: |
          git config user.name "forgejo-actions"
          git config user.email "actions@kodegit.torakode.com"
          git add src/system.json package.json
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          TAG="v${{ steps.version.outputs.new_version }}"
          git tag "$TAG"
          git push origin "$TAG"