name: prepare-release
run-name: Prepare release (${{ inputs.bump }})

# Aparece como botón "Run workflow" en la pestaña Actions de Forgejo
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Tipo de subida de versión'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(node -p "require('./src/system.json').version")
          MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
          MINOR=$(echo "$CURRENT" | cut -d'.' -f2)
          PATCH=$(echo "$CURRENT" | cut -d'.' -f3)

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "Current version: $CURRENT -> New version: $NEW"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update system.json and package.json
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          DOWNLOAD_URL: https://kodegit.torakode.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.new_version }}/release.zip
        run: |
          node -e "
            const fs = require('fs');
            const newVersion = process.env.NEW_VERSION;
            const downloadUrl = process.env.DOWNLOAD_URL;

            const sysPath = 'src/system.json';
            const sys = JSON.parse(fs.readFileSync(sysPath, 'utf8'));
            sys.version = newVersion;
            sys.download = downloadUrl;
            fs.writeFileSync(sysPath, JSON.stringify(sys, null, 4) + '\n');

            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = newVersion;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 4) + '\n');
          "

      - name: Commit version bump
        run: |
          git config user.name "forgejo-actions"
          git config user.email "actions@kodegit.torakode.com"
          git add src/system.json package.json
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          TAG="v${{ steps.version.outputs.new_version }}"
          git tag "$TAG"
          git push origin "$TAG"