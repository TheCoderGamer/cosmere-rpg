jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build system
        run: npm run build

      - name: Create release zip
        run: npm run zip release.zip

      # actions/forgejo-release sube el CONTENIDO de una carpeta, no una
      # lista de archivos sueltos, así que primero los agrupamos ahí
      - name: Prepare release assets
        run: |
          mkdir -p dist/release
          cp release.zip dist/release/
          cp src/system.json dist/release/

      - name: Publish Forgejo Release
        uses: actions/forgejo-release@v2
        with:
          direction: upload
          url: https://kodegit.torakode.com
          repo: ${{ github.repository }}
          release-dir: dist/release
          tag: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}