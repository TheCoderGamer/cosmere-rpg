name: release
run-name: Build and Release ${{ github.ref_name }}

# Se dispara solo al empujar un tag con forma vX.Y.Z (ej: v2.1.1)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --ignore-scripts se salta el postinstall de Electron (devDependency
      # que no hace falta para "build"/"zip", solo añade una descarga pesada)
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build system
        run: npm run build

      - name: Create release zip
        run: npm run zip release.zip

      # actions/forgejo-release sube el CONTENIDO de una carpeta, no una
      # lista de archivos sueltos, así que primero los agrupamos ahí
      - name: Prepare release assets
        run: |
          mkdir -p dist/release
          cp release.zip dist/release/
          cp src/system.json dist/release/

      - name: Publish Forgejo Release
        uses: actions/forgejo-release@v2
        with:
          direction: upload
          url: https://kodegit.torakode.com
          repo: ${{ github.repository }}
          release-dir: dist/release
          tag: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}